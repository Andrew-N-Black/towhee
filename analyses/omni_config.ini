; =============================================================================
; Omniscape.jl configuration: circuit-theory connectivity model run over the
; ResistanceGA-optimized resistance surface (see R/towhee_rga.R and
; towhee_omni.jl/.sh) to map current flow / connectivity across the landscape.
; =============================================================================
[Required]
resistance_file = /scratch/bell/jeon96/Towhee/omniscape/surf.asc
radius = 30
block_size = 1
project_name = /scratch/bell/jeon96/Towhee/omniscape/all/

[General options]
source_from_resistance = true
calc_normalized_current = true
calc_flow_potential = true

parallelize = true
parallel_batch_size = 10

[Output options]
write_raw_currmap = true